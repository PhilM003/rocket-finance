name: rocket_finance
description: A space-themed personal finance mobile application built with Flutter and clean architecture.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.0.0
  bloc: ^8.1.0

  # Database & Local Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  path: ^1.8.3

  # Dependency Injection
  get_it: ^7.6.0

  # Design & UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.0
  fl_chart: ^0.64.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0

  # Excel Export & File Sharing
  excel: ^2.1.0
  share_plus: ^7.2.0
  permission_handler: ^11.4.0

  # Logging & Error Handling
  logger: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/

  fonts:
    - family: Urbanist
      fonts:
        - asset: assets/fonts/Urbanist-Regular.ttf
        - asset: assets/fonts/Urbanist-Bold.ttf
          weight: 700
        - asset: assets/fonts/Urbanist-SemiBold.ttf
          weight: 600